name: "Alternatives textuelles - SPAN / PAN - accessibilité numérique"
description: "Route HTML publique /span-pan/alternatives.html"
priority: medium
requires_auth: false
timeout: 30s
tags: [auto-generated, static-html, miweb, clean-install]

steps:
  - action: open
    url: "{base_url}/span-pan/alternatives.html"
  - action: llm-check
    description: "Page loads and renders content"
    criteria: "Page content is visible, no blank screen, no browser error, no broken primary layout, no visibly missing slide image where one is expected."
    severity: critical
    screenshot: "span-pan-alternatives-html.png"
