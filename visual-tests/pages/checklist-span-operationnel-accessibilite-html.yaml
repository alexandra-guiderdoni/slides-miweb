name: "Accessibilité - Checklist SPAN opérationnel"
description: "Route HTML publique /checklist-span-operationnel/accessibilite.html"
priority: medium
requires_auth: false
timeout: 30s
tags: [auto-generated, static-html, miweb, clean-install]

steps:
  - action: open
    url: "{base_url}/checklist-span-operationnel/accessibilite.html"
  - action: llm-check
    description: "Page loads and renders content"
    criteria: "Page content is visible, no blank screen, no browser error, no broken primary layout, no visibly missing slide image where one is expected."
    severity: critical
    screenshot: "checklist-span-operationnel-accessibilite-html.png"
